name: crm-makesantafe
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

databases:
  - name: make-crm-database
    engine: PG
    version: "16"
    production: true
    cluster_name: crm-makesantafe-db
    db_name: make_santa_fe_crm
    db_user: msfcrm

services:
  - name: web
    environment_slug: node-js
    github:
      repo: thejameswilliam/Make-Santa-Fe-CRM
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm run db:generate && npm run build
    run_command: npm run start:do
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    liveness_health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: CPU_UTILIZATION
        disabled: false
        operator: GREATER_THAN
        value: 80
        window: FIVE_MINUTES
      - rule: MEM_UTILIZATION
        disabled: false
        operator: GREATER_THAN
        value: 85
        window: FIVE_MINUTES
      - rule: RESTART_COUNT
        disabled: false
        operator: GREATER_THAN
        value: 3
        window: FIVE_MINUTES
    termination:
      drain_seconds: 30
      grace_period_seconds: 90

jobs:
  - name: schema-sync
    kind: PRE_DEPLOY
    environment_slug: node-js
    github:
      repo: thejameswilliam/Make-Santa-Fe-CRM
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm run db:generate
    run_command: npm run db:push:prod
    envs:
      - key: DATABASE_URL
        value: ${make-crm-database.DATABASE_URL}
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: DATABASE_CA_CERT
        value: ${make-crm-database.CA_CERT}
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    alerts:
      - rule: RESTART_COUNT
        disabled: false
        operator: GREATER_THAN
        value: 1
        window: FIVE_MINUTES
    termination:
      drain_seconds: 15
      grace_period_seconds: 60

envs:
  - key: NODE_ENV
    value: production
    scope: RUN_TIME
    type: GENERAL
  - key: ALLOW_DEV_LOGIN
    value: "false"
    scope: RUN_TIME
    type: GENERAL
  - key: CRM_SYNC_FRESHNESS_SECONDS
    value: "3600"
    scope: RUN_TIME
    type: GENERAL
  - key: DATABASE_URL
    value: ${make-crm-database.DATABASE_URL}
    scope: RUN_AND_BUILD_TIME
    type: GENERAL
  - key: DATABASE_CA_CERT
    value: ${make-crm-database.CA_CERT}
    scope: RUN_TIME
    type: GENERAL

# Add these encrypted app-level environment variables in DigitalOcean before the first production deploy:
# CRM_SESSION_SECRET=<long-random-secret>
# CRM_APP_BASE_URL=https://your-app-domain.ondigitalocean.app
# WORDPRESS_BASE_URL=https://www.makesantafe.org
# WORDPRESS_CRM_BRIDGE_TOKEN=<shared-token-matching-wp>

# After the app is live, add the custom domain in App Platform networking:
# domains:
#   - domain: crm.makesantafe.org
#     type: PRIMARY
#     minimum_tls_version: "1.2"
